%YAML 1.2
---
$id: http://devicetree.org/schemas/i3c/hpe,i3c-master.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HPE GSC I3C master block

maintainers:
  - Nick Hawkins <nick.hawkins@hpe.com>

allOf:
  - $ref: i3c.yaml#

properties:
  compatible:
    const: hpe,i3c-master

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

required:
  - compatible
  - reg
  - interrupts

unevaluatedProperties: false

examples:
  - |
    i3c-master@d040000 {
        compatible = "hpe,i3c-master";
        interrupts = <3 0>;
        reg = <0x0d040000 0x1000>;
        #address-cells = <3>;
        #size-cells = <0>;
        i2c-scl-hz = <100000>;

        eeprom@57{
            compatible = "atmel,24c01";
            reg = <0x57 0x0 0x10>;
            pagesize = <0x8>;
        };
    };
...
