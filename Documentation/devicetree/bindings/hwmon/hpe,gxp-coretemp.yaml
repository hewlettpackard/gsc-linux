%YAML 1.2
---

$id: http://devicetree.org/schemas/hwmon/hpe,gxp-coretemp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HPE GXP/GSC Core Temp Sensor

maintainers:
  - Nick Hawkins <nick.hawkins@hpe.com>

description: |
  The GXP and GSC Chips have a built in sensor for monitoring the temperature of the
  part which allows for thermal control and notification.

properties:
  compatible:
    const: hpe,gxp-coretemp

  reg:
    maxItems: 1

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    coretemp@c0000130 {
        compatible = "hpe,gxp-coretemp";
        reg = <0xc0000130 0x8>;
    };
